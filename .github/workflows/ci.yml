name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
            test-path: ./tests/AgentInbox.Tests/bin/Release/net10.0/linux-x64/publish/AgentInbox.Tests
          - os: windows-latest
            rid: win-x64
            test-path: .\tests\AgentInbox.Tests\bin\Release\net10.0\win-x64\publish\AgentInbox.Tests.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Update apt cache
        if: runner.os == 'Linux'
        run: sudo apt-get update

      - name: Install native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish Tests (AOT)
        run: dotnet publish tests/AgentInbox.Tests/AgentInbox.Tests.csproj --no-restore -c Release -r ${{ matrix.rid }}

      - name: Test
        run: ${{ matrix.test-path }}
